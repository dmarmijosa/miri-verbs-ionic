<ion-content class="login-content">
  <div class="blob blob--top"></div>
  <div class="blob blob--bottom"></div>

  <div class="login-wrapper">
    <div class="login-card">
      <img src="assets/images/mascot_happy.png" alt="Miri" class="mascot" />
      <h1 class="title">Miriverbs</h1>
      <p class="subtitle">Domina los verbos en inglés</p>

      <div class="cefr-badges">
        @for (level of ['A1', 'A2', 'B1', 'B2', 'C1']; track level) {
          <span class="cefr-badge">{{ level }}</span>
        }
      </div>

      <div class="sso-buttons">
        @if (isLoading()) {
          <ion-spinner name="crescent" color="primary"></ion-spinner>
        } @else {
          <button type="button" class="google-btn" (click)="signInWithGoogle()">
            <app-google-logo />
            <span>Continuar con Google</span>
          </button>
          <button type="button" class="apple-btn" (click)="signInWithApple()">
            <span class="apple-icon"></span>
            <span>Continuar con Apple</span>
          </button>
        }
      </div>

      <p class="legal">
        Al continuar, aceptas nuestros Términos de Servicio y Política de Privacidad.
      </p>
    </div>
  </div>
</ion-content>
